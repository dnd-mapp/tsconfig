name: Release

on:
    push:
        tags:
            - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
    contents: read

jobs:
    validate:
        name: Validate release tag
        runs-on: ubuntu-22.04
        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0

            - name: Verify tag is reachable from main
              shell: bash
              run: |
                  git fetch origin main

                  if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
                      echo "::error::Tag '$GITHUB_REF_NAME' does not point at a commit reachable from main."
                      exit 1
                  fi

            - name: Verify tag matches package version
              shell: bash
              run: |
                  packageVersion=$(node -p "require('./package.json').version")

                  if [ "${GITHUB_REF_NAME#v}" != "$packageVersion" ]; then
                      echo "::error::Tag '$GITHUB_REF_NAME' does not match package.json version '$packageVersion'."
                      exit 1
                  fi

            - name: Run CI checks
              uses: ./.github/actions/ci
              with:
                  node-auth-token: ${{ secrets.GITHUB_TOKEN }}

    release:
        name: Publish release
        needs: validate
        runs-on: ubuntu-22.04
        environment: package-publish
        permissions:
            contents: write
            discussions: write
            packages: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Setup workspace
              uses: dnd-mapp/action-setup-workspace@d5d3148fe3fbe34055eb006f685f190524c16522 # v2.0.0
              with:
                  node-auth-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Prepare release notes
              shell: bash
              env:
                  RELEASED_VERSION: ${{ github.ref_name }}
              run: node scripts/prepare-release-notes.mjs

            - name: Build package
              shell: bash
              run: node scripts/pre-publish-only.mjs

            - name: Pack release tarball
              id: pack
              shell: bash
              working-directory: dist
              run: |
                  pnpm pack --pack-destination ..
                  echo "tarball=$(realpath ../*.tgz)" >> "$GITHUB_OUTPUT"

            - name: Create GitHub release
              shell: bash
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh release create "$GITHUB_REF_NAME" \
                      --notes-file .github/release-notes.md \
                      --discussion-category "Announcements" \
                      "${{ steps.pack.outputs.tarball }}"

            - name: Publish package
              shell: bash
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  pnpm config set "//npm.pkg.github.com/:_authToken" "$NODE_AUTH_TOKEN"
                  pnpm publish "${{ steps.pack.outputs.tarball }}" --no-git-checks
